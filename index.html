<!DOCTYPE html>

<head>

	<title>CityGateChurch - Home</title>
	<style>
	   body {

		   margin: 0;
		   height: 100vh;

	   .site-header {
		   background: linear-gradient(90deg, #2e3235 0%, #3d3e3e 100%);

		   padding: 1rem 0;
		   text-align: center;
