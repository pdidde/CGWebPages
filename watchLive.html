<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityGateChurch - Watch Live</title>
  </head>
  <body>
    <style>
      body {
        margin: 0;
        background: #eef4f6;
        font-family: sans-serif;
      }
      .site-header {
        background: linear-gradient(90deg, #2e3235 0%, #3d3e3e 100%);
        padding: 1rem;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        border-bottom: 4px solid #23a295;
      }
      .site-logo {
        max-width: 100px;
        width: 92%;
        height: auto;
        display: block;
        margin: 0;
      }
    
      .video-container {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
        height: 0;
        overflow: hidden;
        max-width: 100%;
        background: #000;
      }
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>

    <header class="site-header">
      <a href="index.html" aria-label="Go to home page">
        <img src="images/citygatechurch-logo.png" alt="CityGateChurch Logo" class="site-logo" />
      </a>
    </header>
    <main class="page-content">
      <div class="video-container">
        <iframe
          width="560"
          height="315"
          src="https://youtube.com/embed/live_stream?channel=UCJj-ntbpTWWvtubIK0Aww9w&autoplay=1&mute=1"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
      </div>
    </main>
  </body>
</html>
