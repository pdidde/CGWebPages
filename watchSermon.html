<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityGateChurch - Watch Sermon</title>
  </head>
  <body>
    <style>
      body {
        margin: 0;
        background: #eef4f6;
        font-family: sans-serif;
      }
      .site-header {
        background: linear-gradient(90deg, #2e3235 0%, #3d3e3e 100%);
        padding: 1rem;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        border-bottom: 4px solid #23a295;
      }
      .site-logo {
        max-width: 100px;
        width: 92%;
        height: auto;
        display: block;
        margin: 0;
      }
      .video-container {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
        height: 0;
        overflow: hidden;
        max-width: 100%;
        background: #000;
      }
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .admin-panel {
        max-width: 900px;
        margin: 1rem auto 2rem;
        padding: 0 0.5rem;
        font-family: sans-serif;
      }
      .admin-panel form {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .admin-panel input {
        flex: 1 1 320px;
        min-height: 2.25rem;
        padding: 0.5rem;
      }
      .admin-panel button {
        min-height: 2.25rem;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      .admin-help {
        margin: 0.5rem 0 0;
        font-size: 0.9rem;
      }
      .admin-status {
        margin: 0.5rem 0 0;
        font-size: 0.9rem;
      }
    </style>

    <header class="site-header">
      <a href="index.html" aria-label="Go to home page">
        <img src="images/citygatechurch-logo.png" alt="CityGateChurch Logo" class="site-logo" />
      </a>
    </header>
    
    <main class="page-content">
      <div class="video-container">
        <iframe
          id="sermonFrame"
          width="560"
          height="315"
          src=""
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
      </div>
    </main>

    <section class="admin-panel" id="adminPanel" hidden>
      <form id="adminForm">
        <input
          id="srcInput"
          type="url"
          placeholder="Enter embed URL (example: https://www.youtube.com/embed/VIDEO_ID)"
          required
        />
        <button type="submit">Save Source</button>
      </form>
      <p class="admin-help">Admin mode is enabled. Add <strong>?admin=1</strong> to the URL to edit source.</p>
      <p class="admin-status" id="adminStatus"></p>
    </section>

    <script>
      (function () {
        var STORAGE_KEY = "watchSermonSrc";
        var DEFAULT_SRC =
          "https://www.youtube.com/embed/Y5xgNOwrmKk?si=bFjf7nk1pBN6wkCT&autoplay=1&mute=1";

        var frame = document.getElementById("sermonFrame");
        var adminPanel = document.getElementById("adminPanel");
        var adminForm = document.getElementById("adminForm");
        var srcInput = document.getElementById("srcInput");
        var adminStatus = document.getElementById("adminStatus");
        var params = new URLSearchParams(window.location.search);
        var isAdmin = params.get("admin") === "1";

        function isValidHttpUrl(value) {
          try {
            var parsed = new URL(value);
            return parsed.protocol === "https:" || parsed.protocol === "http:";
          } catch (err) {
            return false;
          }
        }

        function getSavedSrc() {
          var saved = localStorage.getItem(STORAGE_KEY);
          return isValidHttpUrl(saved) ? saved : DEFAULT_SRC;
        }

        function setSource(src) {
          frame.src = src;
        }

        setSource(getSavedSrc());

        if (isAdmin) {
          adminPanel.hidden = false;
          srcInput.value = getSavedSrc();

          adminForm.addEventListener("submit", function (event) {
            event.preventDefault();
            var nextSrc = srcInput.value.trim();

            if (!isValidHttpUrl(nextSrc)) {
              adminStatus.textContent = "Please enter a valid http(s) URL.";
              return;
            }

            localStorage.setItem(STORAGE_KEY, nextSrc);
            setSource(nextSrc);
            adminStatus.textContent = "Source updated and saved.";
          });
        }
      })();
    </script>
  </body>
</html>
